<script>
  const path = window.location.pathname.toLowerCase();

  if (path.includes("index")) {
    document.getElementById("home-link").classList.add("active");
  } else if (path.includes("projects") || path.includes("drawings") || path.includes("works")) {
    const worksLink = document.getElementById("works-link");
    if (worksLink) worksLink.classList.add("active");
  } else if (path.includes("about")) {
    document.getElementById("about-link").classList.add("active");
  } else if (path.includes("contact")) {
    document.getElementById("contact-link").classList.add("active");
  }

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const cells = document.querySelectorAll('.landing-cell');
    const path = window.location.pathname.toLowerCase();
    let activeCell = cells[0];
    if (path.includes('drawings')) activeCell = document.querySelector('.work-cell');
    else if (path.includes('about')) activeCell = document.querySelector('.about-cell');
    else if (path.includes('contact')) activeCell = document.querySelector('.contact-cell');
    activeCell.classList.add('active');
    cells.forEach(cell => {
      cell.addEventListener('click', function() {
        const page = this.dataset.page;
        cells.forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        setTimeout(() => { window.location.href = page; }, 500);
      });
    });
  });
</script>
